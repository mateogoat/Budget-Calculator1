<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <h1>Let's Get Budgeting.</h1>
        <img src="/imgs/logo.png" alt="EECU logo">
    </header>
    <article>

        <section class="career">
            <h3>What is your career?</h3>
            <input type="text" placeholder="Search" id="career">
            <img src="/imgs/search.png" alt="search">
            <img src="/imgs/info.png" alt="info">
        </section>

        <section class="edu">
            <h3>How much do you spend on your education?</h3>
            <span>$</span>
            <input type="number" id="edu" placeholder="Enter the amount here...">
            <img src="/imgs/search.png" alt="search" >
            <img src="/imgs/info.png" alt="info">
        </section>

        <section class="housing">
            <h3>How much do you spend on housing?</h3>
            <span>$</span>
            <input type="number" id="housing" placeholder="Enter the amount here...">
            <img src="/imgs/search.png" alt="search">
            <img src="/imgs/info.png" alt="info">
        </section>

        <section class="ess">
            <h3>How much do you spend on essentials?</h3>
            <span>$</span>
            <input type="number" id="ess" placeholder="Enter the amount here...">
            <img src="/imgs/search.png" alt="search">
            <img src="/imgs/info.png" alt="info">
        </section>

        <section class="life">
            <h3>What are your lifestyle expenses?</h3>
            <!--Changed up the wording for this one a little becuase it was getting repetetive-->
            <span>$</span>
            <input type="number" id="life" placeholder="Enter the amount here...">
            <img src="/imgs/search.png" alt="search">
            <img src="/imgs/info.png" alt="info">
        </section>

        <section class="save">
            <h3>How much do you save a month?</h3>
            <span>$</span>
            <input type="number" id="savings" placeholder="Enter the amount here...">
            <img src="/imgs/search.png" alt="search">
            <img src="/imgs/info.png" alt="info">
        </section>
        
    </article>


    <script src="script.js"></script>
</body>

</html>
